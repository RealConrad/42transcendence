networks:
  transcendence:
    name: transcendence
    driver: bridge


services:
  auth_db:
    image: postgres:13
    container_name: auth_db
    env_file:
      - .env.auth
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    depends_on:
      - vault
    networks:
      - transcendence

  auth-service:
    build: ./backend/auth_service
    container_name: auth-service
    image: auth-service
    ports:
      - "8000:8000"
    env_file:
      - .env.auth
    depends_on:
      vault:
        condition: service_healthy
        restart: true
      auth_db:
        condition: service_started
    volumes:
      - ./vault/django/auth_service:/vault/django/auth_service
    networks:
      - transcendence

