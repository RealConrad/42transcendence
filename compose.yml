  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "443:443"
      - "80:80"
    env_file:
      - .env
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl/:ro
      - ./frontend:/var/www/transcendence:ro
    networks:
      - transcendence

  vault:
    build: ./vault/.
    container_name: vault
    ports:
      - "8200:8200"
      - "8201:8201"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8200/v1/sys/health | grep -E '\"sealed\":false,\"initialized\":true' || exit 1"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 5s
    volumes:
      - ./vault/vault_config:/vault/vault_config
      - ./vault/data:/vault/file
      - ./vault/keys:/vault/keys
      - ./vault/django/auth_service:/vault/django/auth_service
      # - ./vault/django/game_service:/vault/django/game_service
    networks:
      - transcendence

volumes:
  auth_postgres_data:
  game_postgres_data:
  vault_data:
